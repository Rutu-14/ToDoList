<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    
<div class="flex flex-col justify-center items-center min-h-screen p-10 border shadow-lg">
    <h1>SignUp</h1>
<form method="POST" class=" space-y-6">
    {% csrf_token %}
    {% if form.non_field_errors %}
        <div class="bg-red-500 text-white p-2">
            {% for error in form.non_field_errors %}
                <p>{{ error }}</p>
            {% endfor %}
        </div>
    {% endif %}
    {% for field in form %}
    <div>
        <label for="">{{field.label}}</label>
        <div class="border rounded p-2">{{field}}</div>
    </div>
    {% endfor %}
    <button type='submit' class="bg-blue-500 w-full text-white px-2 py-2">SignUp</button>
    <a href="{% url 'login' %}" 
   class="bg-blue-500 px-2 py-2 w-full text-white font-bold text-center block">
    Login</a>
</form>
</div>

</body>
</html>
