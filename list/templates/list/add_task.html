<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Task</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">

<div class="min-h-screen flex items-center justify-center">

<div class="bg-white shadow-lg rounded-lg p-8 w-96">

<h2 class="text-2xl font-bold mb-6 text-center">Add Task</h2>

<form method="POST" class="space-y-4">
{% csrf_token %}

<div>
<label class="block font-semibold mb-2">Task</label>
<div class="border">{{ form.task }}</div>
</div>

<!-- Description -->
<div>
<label class="block font-semibold mb-2">Description</label>
<div class="border">{{ form.desc }}</div>
</div>

<!-- Priority -->
<div>
<label class="block font-semibold mb-2">Priority</label>
<div class="border">{{ form.priority }}</div>
</div>

<button type="submit"
class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">
Add Task
</button>

</form>

</div>

</div>

</body>
</html>
